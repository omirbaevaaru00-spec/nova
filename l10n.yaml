# Конфигурация генератора локализации Flutter (flutter gen-l10n).
#
# Этот файл говорит Flutter:
# - Где лежат .arb файлы с переводами (arb-dir).
# - Как назвать шаблонный файл (template-arb-file) — из него берутся
#   описания (@-аннотации) и список ключей.
# - Как назвать сгенерированный класс (output-class).
# - Куда положить сгенерированный код (output-dir).
#
# После изменения .arb файлов выполните:
#   flutter gen-l10n
# Сгенерированные файлы появятся в output-dir.
# Папка с .arb файлами переводов.
arb-dir: lib/l10n
# Шаблонный файл — русский язык (основной).
# Из него генератор берёт список всех ключей и описания.
template-arb-file: app_ru.arb
# Имя сгенерированного класса, который используется в коде.
# В виджетах: AppLocalizations.of(context).loginTitle
output-class: AppLocalizations
# Папка для сгенерированных .dart файлов.
# По умолчанию Flutter кладёт их в .dart_tool, но мы кладём рядом с .arb
# для наглядности (удобно новичкам заглянуть и увидеть результат).
output-dir: lib/l10n/generated
# Включить nullable-геттер of(context) — возвращает null, если делегат
# не зарегистрирован. Мы используем `!` при вызове, потому что делегат
# всегда регистрируется в app.dart.
nullable-getter: false